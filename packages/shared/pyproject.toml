[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bidforge-shared"
version = "0.1.0"
description = "Shared LLM client utilities for BidForge"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.6", "openai>=1.59"]

[tool.hatch.build.targets.wheel]
packages = ["bidforge_shared"]
